<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h2>👑 Admin Panel - จัดการ Staff</h2>

<h3>➕ เพิ่ม Staff</h3>
<form method="POST" action="/admin/add_staff">
    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">เพิ่ม</button>
</form>

<hr>

<h3>📋 รายชื่อ Staff</h3>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Action</th>
    </tr>

    {% for s in staff %}
    <tr>
        <td>{{ s.user_id }}</td>
        <td>{{ s.username }}</td>
        <td>
            <a href="/admin/delete/{{ s.user_id }}">ลบ</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/interface.html">⬅ กลับหน้าแรก</a>

</body>
</html>
